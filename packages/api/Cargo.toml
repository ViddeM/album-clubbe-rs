[package]
name = "api"
version = "0.1.0"
edition = "2021"

[dependencies]
dioxus = { workspace = true, features = ["fullstack"] }
serde = { version = "1.0.228", features = ["derive", "rc"] }
argon2 = { version = "0.5", optional = true }
rand = { version = "0.8", optional = true }
spotify = { workspace = true, optional = true }
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"], optional = true }
tokio = { version = "1", features = ["sync", "rt"], optional = true }
uuid = { version = "1", features = ["v4"], optional = true }

[features]
server = ["dioxus/server", "dep:argon2", "dep:rand", "dep:spotify", "dep:sqlx", "dep:tokio", "dep:uuid"]

[[bin]]
name = "hash_admin_token"
path = "src/bin/hash_admin_token.rs"
required-features = ["server"]
